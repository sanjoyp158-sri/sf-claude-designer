<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SF Claude Designer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">

    <!-- Header -->
    <header class="header">
      <div class="header-brand">
        <div class="sf-logo">☁</div>
        <div>
          <div class="header-title">SF Claude Designer</div>
          <div class="header-subtitle">AI-powered Salesforce design specs</div>
        </div>
      </div>
      <div class="header-actions">
        <span id="authStatus" class="auth-status disconnected">● Not connected</span>
        <span id="userInfo" class="user-name" style="display:none"></span>
        <button id="loginBtn" class="btn-login">Login to Salesforce</button>
        <button id="logoutBtn" class="btn-logout" style="display:none">Logout</button>
      </div>
    </header>

    <!-- Login status bar -->
    <div id="loginStatus" class="login-status" style="display:none"></div>

    <!-- Chat -->
    <div class="chat-area">
      <div id="chatMessages" class="messages"></div>
      <div class="input-row">
        <textarea id="chatInput" class="chat-input"
          placeholder="Login to Salesforce to start chatting..."
          disabled rows="2"></textarea>
        <button id="sendBtn" class="btn-send" disabled>Send</button>
      </div>
    </div>

  </div>

  <!-- Org Type Modal -->
  <div id="orgModal" class="overlay" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-icon">☁</div>
        <h2>Connect to Salesforce</h2>
        <p>Select your org type. Salesforce login will open in a popup window.</p>
      </div>
      <div class="modal-body">
        <button id="btnProduction" class="org-card">
          <div class="org-card-icon">🏢</div>
          <div class="org-card-text">
            <strong>Production</strong>
            <span>login.salesforce.com</span>
          </div>
        </button>
        <button id="btnSandbox" class="org-card">
          <div class="org-card-icon">🧪</div>
          <div class="org-card-text">
            <strong>Sandbox</strong>
            <span>test.salesforce.com</span>
          </div>
        </button>
      </div>
      <button id="cancelOrgModal" class="btn-cancel">Cancel</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
