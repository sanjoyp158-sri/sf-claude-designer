<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SF Claude Designer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="header-left">
        <h1>SF Claude Designer</h1>
        <span id="authStatus" class="auth-status disconnected">Not connected</span>
        <span id="userInfo" class="user-info" style="display:none;"></span>
      </div>
      <div class="header-right">
        <button id="loginBtn" class="btn btn-primary">Login to Salesforce</button>
        <button id="logoutBtn" class="btn btn-secondary" style="display:none;">Logout</button>
      </div>
    </header>

    <div class="chat-container">
      <div id="chatMessages" class="chat-messages"></div>
      <div class="chat-input-area">
        <textarea id="chatInput" class="chat-input" placeholder="Login to Salesforce to start chatting..." disabled rows="2"></textarea>
        <button id="sendBtn" class="btn btn-send" disabled>Send</button>
      </div>
    </div>
  </div>

  <!-- Login Modal -->
  <div id="loginModal" class="modal" style="display:none;">
    <div class="modal-content">
      <h2>Connect to Salesforce</h2>
      <p>Select your Salesforce org type:</p>
      <div class="org-buttons">
        <button id="btnProduction" class="org-btn btn-org-primary">
          🏢 Production
        </button>
        <button id="btnSandbox" class="org-btn btn-org-secondary">
          🧪 Sandbox
        </button>
      </div>
      <div class="custom-domain-section">
        <p class="or-divider">— or use My Domain (custom URL) —</p>
        <div class="custom-domain-input-row">
          <input
            type="text"
            id="customDomainInput"
            class="domain-input"
            placeholder="e.g. cognizant39.my.salesforce.com"
          />
          <button id="btnCustomDomain" class="org-btn btn-org-custom">Connect</button>
        </div>
      </div>
      <p class="modal-note">You will be redirected to Salesforce to login securely.</p>
      <button id="cancelLogin" class="btn btn-link">Cancel</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
