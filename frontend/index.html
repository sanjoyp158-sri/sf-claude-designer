<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SF Claude Designer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="header-left">
        <h1>SF Claude Designer</h1>
        <span id="authStatus" class="auth-status disconnected">Not connected</span>
        <span id="userInfo" class="user-info" style="display:none;"></span>
      </div>
      <div class="header-right">
        <button id="loginBtn" class="btn btn-primary">Login to Salesforce</button>
        <button id="logoutBtn" class="btn btn-secondary" style="display:none;">Logout</button>
      </div>
    </header>

    <!-- Chat Container -->
    <div class="chat-container">
      <div id="chatMessages" class="chat-messages"></div>

      <div class="chat-input-area">
        <textarea
          id="chatInput"
          class="chat-input"
          placeholder="Login to Salesforce to start chatting..."
          disabled
          rows="2"
        ></textarea>
        <button id="sendBtn" class="btn btn-send" disabled>Send</button>
      </div>
    </div>
  </div>

  <!-- Login Modal -->
  <div id="loginModal" class="modal" style="display:none;">
    <div class="modal-content">
      <h2>Connect to Salesforce</h2>
      <p>Select your Salesforce org type to login:</p>
      <div class="org-buttons">
        <button class="org-btn btn btn-primary" data-url="https://login.salesforce.com">
          Production Org
        </button>
        <button class="org-btn btn btn-secondary" data-url="https://test.salesforce.com">
          Sandbox Org
        </button>
      </div>
      <p class="modal-note">You will be redirected to Salesforce to login securely.</p>
      <button id="cancelLogin" class="btn btn-link">Cancel</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
